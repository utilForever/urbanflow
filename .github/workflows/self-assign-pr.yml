name: Self-assign PR author

on:
  pull_request_target:
    types:
      - opened

permissions:
  contents: read
  pull-requests: write

jobs:
  self-assign:
    name: 👤 Assign author
    runs-on: ubuntu-latest
    steps:
      - name: Assign PR author to PR
        uses: actions/github-script@v8
        with:
          script: |
            const login = context.payload.pull_request.user.login;
            const issueNumber = context.payload.pull_request.number;

            if (login.endsWith("[bot]")) {
              core.info(`Skipping self-assignment for bot author @${login} on PR #${issueNumber}`);
              return;
            }

            try {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                assignees: [login],
              });
              core.info(`Assigned @${login} to PR #${issueNumber}`);
            } catch (error) {
              if (error.status === 422) {
                core.warning(`Could not assign @${login} to PR #${issueNumber}: ${error.message}`);
                return;
              }
              throw error;
            }
